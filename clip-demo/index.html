<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlideKit — Clip-Path & Flip Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css">
  <style>
    body { margin: 0; }
    .slidekit-layer { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>

  <script type="module">
    import { init, render, safeRect, el, vstack, hstack, below } from '../slidekit/dist/slidekit.bundle.js';

    await init({
      slide: { w: 1920, h: 1080 },
      safeZone: { left: 120, right: 120, top: 90, bottom: 90 },
      minFontSize: 18,
      fonts: [
        { family: 'Inter', weights: [400, 600, 700], source: 'google' },
      ],
    });

    const safe = safeRect();

    // Stock photos from picsum
    const photos = [
      'https://picsum.photos/id/1015/600/600',  // river
      'https://picsum.photos/id/1025/600/600',  // pug
      'https://picsum.photos/id/1035/600/600',  // mountain
      'https://picsum.photos/id/1040/600/600',  // forest
      'https://picsum.photos/id/1050/600/600',  // coast
      'https://picsum.photos/id/1060/600/600',  // leaves
    ];

    const imgStyle = 'width:100%;height:100%;object-fit:cover;';

    const slides = [
      // ── Slide 1: Clip-Path Shapes ──
      {
        id: 'clip-shapes',
        background: '#0c0c14',
        elements: [
          el('<p style="font:700 56px/1.1 Inter;color:#fff;text-align:center">CSS clip-path in SlideKit</p>', {
            id: 'title', x: 960, y: 80, w: 1400, anchor: 'tc',
          }),
          el('<p style="font:400 24px Inter;color:rgba(255,255,255,0.5);text-align:center">No new API needed — just HTML/CSS inside el()</p>', {
            id: 'subtitle', x: 960, y: below('title', { gap: 12 }), w: 1000, anchor: 'tc',
          }),

          // Row 1: Circle, Ellipse, Inset rounded
          // Circle
          el(`<img src="${photos[0]}" style="${imgStyle}clip-path:circle(50%)">`, {
            id: 'circle', x: 260, y: 240, w: 300, h: 300,
          }),
          el('<p style="font:600 22px Inter;color:#ccc;text-align:center">circle(50%)</p>', {
            id: 'circle-label', x: 260, y: below('circle', { gap: 12 }), w: 300,
          }),

          // Ellipse
          el(`<img src="${photos[1]}" style="${imgStyle}clip-path:ellipse(50% 35% at 50% 50%)">`, {
            id: 'ellipse', x: 660, y: 240, w: 300, h: 300,
          }),
          el('<p style="font:600 22px Inter;color:#ccc;text-align:center">ellipse(50% 35%)</p>', {
            id: 'ellipse-label', x: 660, y: below('ellipse', { gap: 12 }), w: 300,
          }),

          // Rounded rect (inset)
          el(`<img src="${photos[2]}" style="${imgStyle}clip-path:inset(0 round 24px)">`, {
            id: 'rounded', x: 1060, y: 240, w: 300, h: 300,
          }),
          el('<p style="font:600 22px Inter;color:#ccc;text-align:center">inset(0 round 24px)</p>', {
            id: 'rounded-label', x: 1060, y: below('rounded', { gap: 12 }), w: 300,
          }),

          // Row 2: Diamond, Pentagon, Star
          // Diamond
          el(`<img src="${photos[3]}" style="${imgStyle}clip-path:polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)">`, {
            id: 'diamond', x: 260, y: 640, w: 300, h: 300,
          }),
          el('<p style="font:600 22px Inter;color:#ccc;text-align:center">polygon (diamond)</p>', {
            id: 'diamond-label', x: 260, y: below('diamond', { gap: 12 }), w: 300,
          }),

          // Pentagon
          el(`<img src="${photos[4]}" style="${imgStyle}clip-path:polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%)">`, {
            id: 'pentagon', x: 660, y: 640, w: 300, h: 300,
          }),
          el('<p style="font:600 22px Inter;color:#ccc;text-align:center">polygon (pentagon)</p>', {
            id: 'pentagon-label', x: 660, y: below('pentagon', { gap: 12 }), w: 300,
          }),

          // Star
          el(`<img src="${photos[5]}" style="${imgStyle}clip-path:polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)">`, {
            id: 'star', x: 1060, y: 640, w: 300, h: 300,
          }),
          el('<p style="font:600 22px Inter;color:#ccc;text-align:center">polygon (star)</p>', {
            id: 'star-label', x: 1060, y: below('star', { gap: 12 }), w: 300,
          }),

          // Right side: code snippet
          el(`<pre style="font:400 18px/1.5 'Courier New',monospace;color:#a8e6cf;background:rgba(255,255,255,0.05);padding:24px;border-radius:12px;white-space:pre-wrap">el('&lt;img src="photo.jpg" style="...clip-path:circle(50%)"&gt;',
  { x: 260, y: 240, w: 300, h: 300 })</pre>`, {
            id: 'code', x: 1440, y: 340, w: 420,
          }),

          el('<p style="font:400 20px Inter;color:rgba(255,255,255,0.4);text-align:center">All shapes work via CSS clip-path on &lt;img&gt; inside el()</p>', {
            id: 'footer', x: 960, y: 1000, w: 1000, anchor: 'bc',
          }),
        ],
      },

      // ── Slide 2: Flip H / Flip V Demo ──
      {
        id: 'flip-demo',
        background: '#0c0c14',
        elements: [
          el('<p style="font:700 56px/1.1 Inter;color:#fff;text-align:center">Flip H / Flip V</p>', {
            id: 'flip-title', x: 960, y: 80, w: 1400, anchor: 'tc',
          }),
          el('<p style="font:400 24px Inter;color:rgba(255,255,255,0.5);text-align:center">CSS transform is blocked by SlideKit — needs a dedicated prop</p>', {
            id: 'flip-subtitle', x: 960, y: below('flip-title', { gap: 12 }), w: 1200, anchor: 'tc',
          }),

          // Original
          el(`<img src="${photos[1]}" style="${imgStyle}border-radius:16px">`, {
            id: 'orig', x: 260, y: 280, w: 350, h: 350,
          }),
          el('<p style="font:600 24px Inter;color:#fff;text-align:center">Original</p>', {
            id: 'orig-label', x: 260, y: below('orig', { gap: 16 }), w: 350,
          }),

          // Flipped H — using inline style on the img (works because it's on the img, not the container)
          el(`<img src="${photos[1]}" style="${imgStyle}border-radius:16px;transform:scaleX(-1)">`, {
            id: 'flip-h', x: 710, y: 280, w: 350, h: 350,
          }),
          el('<p style="font:600 24px Inter;color:#7c5cbf;text-align:center">Flip Horizontal</p>', {
            id: 'flip-h-label', x: 710, y: below('flip-h', { gap: 16 }), w: 350,
          }),
          el('<p style="font:400 18px \'Courier New\',monospace;color:#a8e6cf;text-align:center">transform:scaleX(-1) on &lt;img&gt;</p>', {
            id: 'flip-h-code', x: 710, y: below('flip-h-label', { gap: 8 }), w: 350,
          }),

          // Flipped V
          el(`<img src="${photos[1]}" style="${imgStyle}border-radius:16px;transform:scaleY(-1)">`, {
            id: 'flip-v', x: 1160, y: 280, w: 350, h: 350,
          }),
          el('<p style="font:600 24px Inter;color:#7c5cbf;text-align:center">Flip Vertical</p>', {
            id: 'flip-v-label', x: 1160, y: below('flip-v', { gap: 16 }), w: 350,
          }),
          el('<p style="font:400 18px \'Courier New\',monospace;color:#a8e6cf;text-align:center">transform:scaleY(-1) on &lt;img&gt;</p>', {
            id: 'flip-v-code', x: 1160, y: below('flip-v-label', { gap: 8 }), w: 350,
          }),

          // Explanation box
          el(`<div style="background:rgba(124,92,191,0.15);border:1px solid rgba(124,92,191,0.3);border-radius:12px;padding:24px">
            <p style="font:700 24px Inter;color:#fff;margin-bottom:12px">The problem:</p>
            <p style="font:400 20px/1.5 Inter;color:#ccc"><code style="color:#a8e6cf">transform</code> is blocked on SlideKit containers (conflicts with positioning). But <code style="color:#a8e6cf">transform</code> on inner HTML elements (like <code style="color:#a8e6cf">&lt;img&gt;</code>) works fine.</p>
            <p style="font:400 20px/1.5 Inter;color:#ccc;margin-top:12px">A dedicated <code style="color:#a8e6cf">flipH</code> / <code style="color:#a8e6cf">flipV</code> prop would be cleaner and work on any element type.</p>
          </div>`, {
            id: 'explanation', x: 260, y: 740, w: 1400,
          }),
        ],
      },
    ];

    await render(slides);

    Reveal.initialize({
      hash: true,
      slideNumber: true,
      transition: 'fade',
      width: 1920,
      height: 1080,
      center: false,
    });

    console.log('Clip-path & flip demo loaded. Scene model at window.sk');
  </script>
</body>
</html>
