        image("source/assets/images/paper_fig_p8_1.png", {
          id: "s15-image",
          x: 960, y: below("s15-heading", { gap: 20 }), w: 900, h: 520,
          anchor: "tc", fit: "contain",
        }),
        text("Systems-facing: Reliability & Safety (85%), Privacy (77%)  |  Human-facing: Fairness elevated", {
          id: "s15-caption",
          x: 960, y: below("s15-image", { gap: 12 }), w: 1100,
          anchor: "tc", size: 20, weight: 400, color: "#9CA3AF",
          font: "Inter", align: "center", lineHeight: 1.5,
        }),
      ],
    });

    // ========== SLIDE 16: DESIGN PRINCIPLES ==========
    slides.push({
      id: "design-principles",
      background: "#111827",
      elements: (() => {
        const els = [];
        els.push(text("IMPLICATIONS FOR TOOL BUILDERS", {
          id: "s16-label", x: 960, y: 200, w: 800,
          anchor: "tc", size: 22, weight: 600, color: "#3B82F6",
          font: "Roboto", align: "center", letterSpacing: "0.12em",
        }));
        els.push(text("THREE DESIGN PRINCIPLES", {
          id: "s16-heading", x: 960, y: below("s16-label", { gap: 10 }), w: 800,
          anchor: "tc", size: 52, weight: 700, color: "#F9FAFB",
          font: "Roboto", align: "center",
        }));

        const cardW = 370;
        const gap = 16;
        const totalW = cardW * 3 + gap * 2;
        const startX = (1920 - totalW) / 2;
        const cards = [
          { emoji: "🎭", color: "#3B82F6", title: "Task-Aware Personas", desc: "Exploration vs. implementation vs. review vs.\u00A0ops modes. Adapt AI behavior to task\u00A0context." },
          { emoji: "🔒", color: "#10B981", title: "Human-Gated Control", desc: "Suggest-only flows, reversible changes, approval checkpoints. Never automate silently." },
          { emoji: "🧠", color: "#A78BFA", title: "Augmentation, Not Automation", desc: "Preserve craft, reveal reasoning, prevent deskilling. Keep humans in the\u00A0loop." },
        ];

        cards.forEach((card, i) => {
          const cx = startX + i * (cardW + gap);
          const pfx = `s16-c${i}`;
          els.push(rect({
            id: `${pfx}-bg`,
            x: cx, y: below("s16-heading", { gap: 36 }), w: cardW, h: 240,
            fill: "rgba(255,255,255,0.06)",
            style: {
              border: "1px solid rgba(255,255,255,0.1)",
              borderBottom: `2px solid ${card.color}`,
              borderRadius: "10px",
            },
          }));
          // Icon circle
          els.push(rect({
            id: `${pfx}-circle`,
            x: cx + 24, y: below("s16-heading", { gap: 52 }), w: 52, h: 52,
            fill: `${card.color}22`,
            style: { borderRadius: "50%", border: `1px solid ${card.color}44` },
          }));
          els.push(text(card.emoji, {
            id: `${pfx}-emoji`,
            x: cx + 30, y: below("s16-heading", { gap: 60 }), w: 40, size: 28,
          }));
          els.push(text(card.title, {
            id: `${pfx}-title`,
            x: cx + 24, y: below("s16-heading", { gap: 118 }), w: cardW - 48,
            size: 22, weight: 600, color: card.color, font: "Inter",
          }));
          els.push(text(card.desc, {
            id: `${pfx}-desc`,
            x: cx + 24, y: below("s16-heading", { gap: 150 }), w: cardW - 48,
            size: 17, weight: 400, color: "#9CA3AF", font: "Inter", lineHeight: 1.5,
          }));
        });
        return els;
      })(),
    });

    // ========== SLIDE 17: CLOSING ==========
    slides.push({
      id: "closing",
      background: "#111827",
      elements: [
        text("CLOSING", {
          id: "s17-label", x: 60, y: 180, w: 600,
          size: 22, weight: 600, color: "#3B82F6",
          font: "Roboto", letterSpacing: "0.12em",
        }),
        text("DELIVER AI\nWHERE IT\nMATTERS", {
          id: "s17-title",
          x: 60, y: below("s17-label", { gap: 10 }), w: 600,
          size: 90, weight: 900, font: "Roboto", lineHeight: 1.05,
          className: "grad",
        }),
        text("Preserve agency. Foster expertise.\nSustain meaningful work.", {
          id: "s17-tagline",
          x: 60, y: below("s17-title", { gap: 24 }), w: 600,
          size: 26, weight: 300, color: "#F9FAFB",
          font: "Inter", lineHeight: 1.5,
        }),
        text("📄 Interactive diagrams, per-task reports & chat with the research:", {
          id: "s17-link-intro",
          x: 60, y: below("s17-tagline", { gap: 24 }), w: 600,
          size: 18, weight: 400, color: "#D1D5DB", font: "Inter",
        }),
        text("aka.ms/AI-Where-It-Matters", {
          id: "s17-link",
          x: 60, y: below("s17-link-intro", { gap: 6 }), w: 600,
          size: 18, weight: 600, color: "#10B981", font: "Inter",
        }),
        image("source/assets/images/s17-closing.png", {
          id: "s17-image",
          x: 720, y: 100, w: 760, h: 620,
          fit: "contain",
        }),
      ],
    });

    await render(slides);

    Reveal.initialize({
      width: 1920,
      height: 1080,
      center: false,
      hash: true,
      slideNumber: true,
      transition: 'slide',
      margin: 0,
    });
  </script>
</body>
</html>
