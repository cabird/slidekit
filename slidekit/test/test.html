<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlideKit Tests</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h1 { color: #fff; }
    h2 { color: #4caf50; }
    h2:has(~ div .fail) { color: #f44336; }
    h3 { color: #90caf9; margin-top: 16px; }
    .test-group { margin-bottom: 20px; }
    ul { list-style: none; padding-left: 0; }
    li { padding: 4px 8px; margin: 2px 0; border-radius: 4px; font-family: monospace; font-size: 14px; }
    li.pass { background: rgba(76, 175, 80, 0.1); color: #81c784; }
    li.fail { background: rgba(244, 67, 54, 0.1); color: #ef9a9a; }
    li.fail pre { white-space: pre-wrap; font-size: 12px; color: #ef5350; margin: 4px 0 0 16px; }
  </style>
</head>
<body>
  <h1>SlideKit Test Suite</h1>
  <div id="test-results">Running tests...</div>

  <script type="module">
    import { runTests } from './test-runner.js';

    // Import all test modules — they register tests via describe()/it()
    import './test-primitives.js';
    import './test-renderer.js';
    import './test-text.js';
    import './test-layout.js';
    import './test-validation.js';
    import './test-collision-stacks.js';
    import './test-alignment.js';
    import './test-compounds.js';

    // Run all tests after modules load
    runTests().then(results => {
      console.log("Test run complete:", results.passed, "/", results.total, "passed");
    });
  </script>
</body>
</html>
